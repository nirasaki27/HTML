<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Mảng - C Basic</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        h2 { color: #0056b3; text-align: center; font-size: 24px; margin-top: 0;}
        .question { margin-bottom: 20px; }
        .question h3 { font-size: 16px; margin-bottom: 10px; color: #222;}
        .options label {
            display: block;
            background: #e9ecef;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .options label:hover { background: #d3e0ea; }
        input[type="radio"] { margin-right: 10px; }
        .btn-submit {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #218838; }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            display: none;
            padding: 15px;
            border-radius: 5px;
        }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Kiểm tra kiến thức: Mảng</h2>
    <form id="quizForm">
        <div class="question">
            <h3>1. Chỉ số (index) của phần tử đầu tiên trong mảng C bắt đầu từ số mấy?</h3>
            <div class="options">
                <label><input type="radio" name="q1" value="0"> a. 0</label>
                <label><input type="radio" name="q1" value="1"> b. 1</label>
                <label><input type="radio" name="q1" value="-1"> c. -1</label>
            </div>
        </div>

        <div class="question">
            <h3>2. Khai báo int arr[5]; thì phần tử cuối cùng của mảng là gì?</h3>
            <div class="options">
                <label><input type="radio" name="q2" value="arr[5]"> a. arr[5]</label>
                <label><input type="radio" name="q2" value="arr[4]"> b. arr[4]</label>
                <label><input type="radio" name="q2" value="arr[0]"> c. arr[0]</label>
            </div>
        </div>

        <div class="question">
            <h3>3. Tên của một mảng (ví dụ: arr) đại diện cho điều gì?</h3>
            <div class="options">
                <label><input type="radio" name="q3" value="size"> a. Kích thước của mảng</label>
                <label><input type="radio" name="q3" value="value"> b. Giá trị của tất cả phần tử</label>
                <label><input type="radio" name="q3" value="address"> c. Địa chỉ của phần tử đầu tiên</label>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="chamDiem()">Nộp Bài</button>
    </form>
    <div id="result"></div>
</div>

<script>
    function chamDiem() {
        let score = 0;
        let total = 3;
        
        // Lấy đáp án của người dùng
        let q1 = document.querySelector('input[name="q1"]:checked');
        let q2 = document.querySelector('input[name="q2"]:checked');
        let q3 = document.querySelector('input[name="q3"]:checked');

        // Kiểm tra đúng sai
        if (q1 && q1.value === "0") score++;
        if (q2 && q2.value === "arr[4]") score++;
        if (q3 && q3.value === "address") score++;

        // Hiển thị kết quả
        let resultDiv = document.getElementById("result");
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "Bạn đã đúng " + score + "/" + total + " câu!";

        if (score === total) {
            resultDiv.className = "pass";
            resultDiv.innerHTML += " <br>🎉 Xuất sắc! Phù thủy code đây rồi!";
        } else {
            resultDiv.className = "fail";
            resultDiv.innerHTML += " <br>💡 Cần ôn tập lại một chút nhé!";
        }
    }
</script>

</body>
</html>
